<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>製品案内 | FJSインターナショナル株式会社</title>
    <link rel="icon" href="https://www.fjsi.co.jp/img/favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="products">
    <header class="site-header">
      <a class="brand" href="index.html"><img src="assets/fjsi-logo-transparent.png" alt="FJSインターナショナル株式会社"></a>
      <div class="language-switch" aria-label="Language switch"><button class="lang-button is-active" type="button" data-lang-option="ja">JP</button><button class="lang-button" type="button" data-lang-option="en">EN</button></div>
    </header>
    <main>
      <section class="page-hero">
        <p class="eyebrow" data-i18n="productsKicker">Products</p>
        <h1 data-i18n="productsTitle">製品案内</h1>
        <p data-i18n="productsLead">自社によりインテリアの企画製造卸販売を行っております。また、当社の企画・生産背景を活用したOEM・ODM事業も行っております。</p>
      </section>
      <section class="section product-page-grid">
        <article class="product-card">
          <img src="https://www.fjsi.co.jp/img/products/carpet.jpg" alt="">
          <div><h2 data-i18n="productFloorTitle">フロアマット</h2><p data-i18n="productFloorBody">高品質なフロアマットをオリジナルデザインで生産しています。</p></div>
        </article>
        <article class="product-card">
          <div class="product-photo bedding-photo" role="img" aria-label="Bedding products"></div>
          <div><h2 data-i18n="productBeddingTitle">寝具</h2><p data-i18n="productBeddingBody">枕、マットレス、敷きパッドなど寝具全般を企画・生産しています。</p></div>
        </article>
        <article class="product-card">
          <div class="product-photo oem-photo" role="img" aria-label="OEM production"></div>
          <div><h2 data-i18n="productOemTitle">OEM生産</h2><p data-i18n="productOemBody">当社の高品質製品をお客様のブランドで。ご要望に応じてOEM・ODM生産も行っております。</p></div>
        </article>
      </section>
    </main>
    <footer class="site-footer"><p>Copyright © 2019 FJS International. All Rights Reserved.</p></footer>

    <script src="app.js"></script>
